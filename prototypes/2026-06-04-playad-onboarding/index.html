    html, body, #root { height: 100%; }
    body { background: #F1F1F3; color: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn .35s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    .btn-grad { background-image: linear-gradient(135deg, #FFA73C 0%, #FF5255 100%); color: #fff; }
    .btn-grad:hover { opacity: .92; }
    @keyframes shimmerText { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .shimmer-text { background: linear-gradient(90deg, #9CA3AF 35%, #111827 50%, #9CA3AF 65%); background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: shimmerText 3.4s linear infinite; }
    /* 细而克制的滚动条 */
    * { scrollbar-width: thin; scrollbar-color: rgba(17,24,39,.18) transparent; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(17,24,39,.18); border-radius: 9999px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(17,24,39,.32); background-clip: padding-box; }
    /* 登录引导:脉冲光环 + 提示轻微浮动 */
    @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(255,82,85,.45); } 70% { box-shadow: 0 0 0 12px rgba(255,82,85,0); } 100% { box-shadow: 0 0 0 0 rgba(255,82,85,0); } }
    .pulse-ring { animation: pulseRing 1.9s ease-out infinite; }
    @keyframes hintFloat { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-4px) rotate(-4deg); } }
    .hint-float { animation: hintFloat 2s ease-in-out infinite; }
    /* pro tip 卡片:边框电流流转 */
    @property --flowA { syntax: "<angle>"; inherits: false; initial-value: 0deg; }
    @keyframes flowSpin { to { --flowA: 360deg; } }
    .flow-border { position: relative; }
    .flow-border::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 2px; pointer-events: none;
      background: conic-gradient(from var(--flowA), transparent 0 58%, #FFA73C 74%, #FF5255 84%, transparent 92% 100%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      animation: flowSpin 4.8s linear infinite;
    }
    .flow-border:nth-child(2)::before { animation-delay: -1.6s; }
    .flow-border:nth-child(3)::before { animation-delay: -3.2s; }
    @supports not (background: conic-gradient(from var(--flowA), red, blue)) {
      .flow-border::before { display: none; }
    }
  </style>
</head>

    function Typewriter({ text, speed = 18, startDelay = 220, onDone }) {
      const [n, setN] = useState(0);
      useEffect(() => {
        setN(0);
        let i = 0;
        let interval;
        const start = setTimeout(() => {
          interval = setInterval(() => {
            i += 1;
            setN(i);
            if (i >= text.length) { clearInterval(interval); if (onDone) onDone(); }
          }, speed);
        }, startDelay);
        return () => { clearTimeout(start); clearInterval(interval); };
      }, [text]);
      const done = n >= text.length;
      return (
        <span>
          {text.slice(0, n)}
          {!done && <span className="inline-block w-0.5 h-[1.05em] align-text-bottom bg-gray-700 ml-0.5 animate-pulse" />}
        </span>
      );
    }

      useEffect(() => { const id = setTimeout(() => setTyped(true), 6000); return () => clearTimeout(id); }, []);
      return (

          {typed && <div className="fade-in">{children}</div>}
        </>

    function VideoTile({ src, onTry }) {
      const ref = useRef(null);
      const [muted, setMuted] = useState(true);
      function onEnter() {
        const v = ref.current; if (!v) return;
        document.querySelectorAll("video").forEach((o) => { if (o !== v) o.pause(); });
        const p = v.play(); if (p && p.catch) p.catch(() => {});
      }
      function onLeave() { const v = ref.current; if (v) v.pause(); }
      function toggleMute(e) {
        e.stopPropagation();
        const v = ref.current;
        if (!v) return;
        v.muted = !v.muted;
        setMuted(v.muted);
      }
      return (
        <div className="group relative aspect-[9/16] rounded-xl overflow-hidden bg-gray-200 border border-gray-100" onMouseEnter={onEnter} onMouseLeave={onLeave}>
          {src && <video ref={ref} src={src} className="w-full h-full object-cover" loop muted={muted} playsInline />}
          {src && (
            <button onClick={toggleMute} className="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/55 hover:bg-black/70 text-white flex items-center justify-center transition-all">
              {muted ? (

              {DATA.plans.map((p) => (
                <div key={p.name} className={`rounded-2xl p-7 bg-white border ${p.featured ? "border-[#FF7A45] ring-2 ring-orange-100 relative shadow-md" : "border-gray-200 shadow-sm"}`}>
                  {p.featured && <span className="absolute -top-3 right-5 btn-grad text-xs font-semibold rounded-full px-3 py-1">Popular</span>}
                  <h3 className="font-bold text-gray-900 text-lg">{p.name}</h3>
                  <div className="mt-2"><span className="text-4xl font-extrabold text-gray-900">{p.price}</span><span className="text-gray-500">{p.per}</span></div>
                  <ul className="mt-6 space-y-2.5">
                    {p.features.map((f) => <li key={f} className="text-sm text-gray-600 flex gap-2"><span className="text-[#FF5255]">✓</span>{f}</li>)}
                  </ul>
                  <button className={`mt-7 w-full rounded-xl py-3 font-semibold transition-all ${p.featured ? "btn-grad" : "border border-gray-300 text-gray-700 hover:bg-gray-50"}`}>Choose {p.name}</button>
                </div>
              ))}
            </div>
          </div>
          <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-200 px-6 sm:px-10 py-4 flex items-center justify-between">
            <div>
              <p className="font-semibold text-gray-900">Not ready to upgrade?</p>
              <p className="text-sm text-gray-500">Your current setup will keep working — upgrade anytime from Settings.</p>
            </div>
            <button onClick={() => { onClose(); if (window.__toast) window.__toast("已返回首页,当前配置继续可用"); }} className="flex items-center gap-1.5 font-semibold text-gray-900 hover:text-[#FF5255] transition-all shrink-0">
              Continue without upgrading
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg>
            </button>
          </div>
        </div>
      );
    }

    function Dashboard() {
      const [lightboxIndex, setLightboxIndex] = useState(null);
      const [paywall, setPaywall] = useState(false);
      return (
        <div className="max-w-7xl mx-auto px-6 py-6">
          <AvatarLine className="mb-8">🎉 Congrats on creating your first ads! Later, you can make video ads too.</AvatarLine>
          <div className="grid grid-cols-3 gap-5">
            {DATA.ads.map((ad, i) => <AdPoster key={ad.id} ad={ad} onOpen={() => setLightboxIndex(i)} onGenerateVideo={() => setPaywall(true)} />)}
          </div>

          <VideoAdsCard className="mt-8" message="You can create video ads, too" />

          <NextSteps />

          {lightboxIndex !== null && <Lightbox ads={DATA.ads} index={lightboxIndex} onClose={() => setLightboxIndex(null)} />}
          {paywall && <UpgradeModal onClose={() => setPaywall(false)} />}
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("login"); // 'login' | 'loading' | 'app'
      const [step, setStep] = useState(1);
      const [selectedFormats, setSelectedFormats] = useState(["feed11"]);
      const [toast, setToast] = useState(null);
      useEffect(() => { window.__toast = (m) => setToast(m); return () => { window.__toast = null; }; }, []);

      // 渐进式单页:只要页面变高(出现新内容,无论是新 step 还是同一卡片内的状态变化/
      // 打字机揭示),就平滑滚动到最新内容。用 MutationObserver 监听 DOM 变化 + 高度增长判断。
      useEffect(() => {
        if (screen !== "app") return;
        let last = document.documentElement.scrollHeight;
        let raf = 0;
        function toBottom() {
          window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" });
        }
        function check() {
          // step 5 是配置弹窗(overlay),不滚动底部
          if (step === 5) { last = document.documentElement.scrollHeight; return; }
          const h = document.documentElement.scrollHeight;
          if (h > last + 4) { last = h; cancelAnimationFrame(raf); raf = requestAnimationFrame(toBottom); }
        }
        const obs = new MutationObserver(check);
        obs.observe(document.body, { childList: true, subtree: true, characterData: true });
        const id = setTimeout(check, 120);
        return () => { obs.disconnect(); clearTimeout(id); cancelAnimationFrame(raf); };
      }, [screen, step]);

      function restart() {
        setSelectedFormats(["feed11"]);
        setStep(1);
        setScreen("login");
        window.scrollTo({ top: 0 });
      }

      if (screen === "login") return <LoginScreen onNext={() => setScreen("loading")} />;
      if (screen === "loading") return <EntryLoading onDone={() => setScreen("app")} />;

      return (
        <AppShell step={step} onRestart={restart} onSkip={() => { setStep(7); window.scrollTo({ top: 0 }); }}>
          <div className="space-y-2">
            <div data-step="1"><BasicDetailsForm onNext={() => setStep(2)} /></div>
            {step >= 2 && <div data-step="2" className="fade-in"><UrlInputScreen onNext={() => setStep(3)} /></div>}
            {step >= 3 && <div data-step="3" className="fade-in"><BrandDNA onNext={() => setStep(5)} active={step === 3} /></div>}
            {step === 6 && <div data-step="6" className="fade-in"><GenerationLoading onDone={() => setStep(7)} /></div>}
            {step >= 7 && <div data-step="7" className="fade-in"><Dashboard /></div>}
          </div>
          {step === 5 && (
            <ConfigModal
              selectedFormats={selectedFormats}
              setSelectedFormats={setSelectedFormats}
              onSubmit={() => setStep(6)}
              onClose={() => setStep(3)}
            />
          )}
          {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
        </AppShell>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
