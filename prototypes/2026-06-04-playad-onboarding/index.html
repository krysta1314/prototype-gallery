    function Typewriter({ text, speed = 13, startDelay = 220, onDone }) {
      const [n, setN] = useState(0);
      useEffect(() => {
        setN(0);
        let i = 0;
        let interval;
        const start = setTimeout(() => {
          interval = setInterval(() => {
            i += 1;
            setN(i);
            if (i >= text.length) { clearInterval(interval); if (onDone) onDone(); }
          }, speed);
        }, startDelay);
        return () => { clearTimeout(start); clearInterval(interval); };
      }, [text]);
      const done = n >= text.length;
      return (
        <span>
          {text.slice(0, n)}
          {!done && <span className="inline-block w-0.5 h-[1.05em] align-text-bottom bg-gray-700 ml-0.5 animate-pulse" />}
        </span>
      );
    }

            <div className="flex items-center justify-between px-7 py-4 border-t border-gray-200">
              <button onClick={() => sub === 0 ? onClose() : setSub(sub - 1)}
                className="border border-gray-300 rounded-xl px-5 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-all">Back</button>
              <div className="flex gap-1.5">
                {[0, 1, 2].map((s) => <div key={s} className={`h-1.5 w-8 rounded-full transition-all ${s <= sub ? "btn-grad" : "bg-gray-200"}`} />)}
              </div>
              <button onClick={() => sub < 2 ? setSub(sub + 1) : handleSubmit()} disabled={submitting}
                className="btn-grad font-semibold rounded-xl px-6 py-2.5 transition-all flex items-center gap-2 disabled:opacity-80">
                {submitting && <svg className="spin" width="16" height="16" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="#fff" strokeWidth="5" strokeLinecap="round" strokeDasharray="90 150" /></svg>}
                {sub < 2 ? "Next" : (submitting ? "Submitting…" : "Submit")}</button>
            </div>
          </div>
        </Modal>
      );
    }
    function VideoTile({ src, onTry }) {
      const ref = useRef(null);
      const [muted, setMuted] = useState(true);
      function onEnter() {
        const v = ref.current; if (!v) return;
        document.querySelectorAll("video").forEach((o) => { if (o !== v) o.pause(); });
        const p = v.play(); if (p && p.catch) p.catch(() => {});
      }
      function onLeave() { const v = ref.current; if (v) v.pause(); }
      function toggleMute(e) {
        e.stopPropagation();
        const v = ref.current;
        if (!v) return;
        v.muted = !v.muted;
        setMuted(v.muted);
      }
      return (
        <div className="group relative aspect-[9/16] rounded-xl overflow-hidden bg-gray-200 border border-gray-100" onMouseEnter={onEnter} onMouseLeave={onLeave}>
          {src && <video ref={ref} src={src} className="w-full h-full object-cover" loop muted={muted} playsInline />}
          {src && (
            <button onClick={toggleMute} className="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/55 hover:bg-black/70 text-white flex items-center justify-center transition-all">
              {muted ? (
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
              ) : (
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
              )}
            </button>
          )}
          {src && (
            <div className="absolute inset-x-0 bottom-0 p-2 flex justify-center opacity-0 group-hover:opacity-100 transition-all bg-gradient-to-t from-black/50 to-transparent pt-8">
              <button onClick={(e) => { e.stopPropagation(); onTry && onTry(); }} className="btn-grad text-xs font-semibold rounded-full px-4 py-2 shadow-lg">Try it now</button>
            </div>
          )}
        </div>
      );
    }

    function VideoAdsCard({ className = "", message }) {
      const [paywall, setPaywall] = useState(false);
      return (
        <div className={"bg-white border border-gray-200 rounded-2xl shadow-sm p-6 " + className}>
          <div className="flex items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF5255" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l6-3v10l-6-3"/></svg>
            <h2 className="font-bold text-gray-900">{message}</h2>
          </div>
          <p className="text-gray-500 text-sm mt-1.5 mb-5">Buzz can also make short-form video ads for hooks, feature demos, UGC-style concepts, and social cutdowns when you're ready to expand beyond image creatives.</p>
          <div className="grid grid-cols-6 gap-3">
            {VIDEO_THUMBS.map((src, i) => <VideoTile key={i} src={src} onTry={() => setPaywall(true)} />)}
          </div>
          {paywall && <UpgradeModal onClose={() => setPaywall(false)} />}
        </div>
      );
    }

    function MiniAvatar({ tone }) {
      const bg = tone === "buzz" ? "btn-grad" : tone === "gray" ? "bg-gray-300" : "bg-indigo-200";
      return <div className={"w-6 h-6 rounded-full border-2 border-white shadow-sm " + bg} />;
    }

    function UseCaseCard({ uc, onRun }) {
      return (
        <div className="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden flex flex-col hover:shadow-md transition-all">
          <div className="relative h-36 flex items-center justify-center" style={{ background: uc.bg }}>
            {uc.badge && <span className="absolute top-3 right-3 text-[11px] font-semibold text-indigo-700 bg-white/90 rounded-full px-2.5 py-1 shadow-sm">{uc.badge}</span>}
            <div className="w-16 h-16 rounded-2xl bg-white/85 backdrop-blur flex items-center justify-center text-indigo-600 shadow-md">{uc.icon}</div>
          </div>
          <div className="p-4 flex flex-col flex-1">
            <h3 className="font-bold text-gray-900 text-[15px]">{uc.title}</h3>
            <p className="text-sm text-gray-500 mt-1 flex-1">{uc.desc}</p>
            <div className="flex items-center justify-end mt-4">
              <button onClick={onRun} className="flex items-center gap-1 text-sm font-semibold text-gray-800 hover:text-[#FF5255] transition-all">Run <span>›</span></button>
            </div>
          </div>
        </div>
      );
    }

    function NextSteps() {
      const [paywall, setPaywall] = useState(false);
      const ucs = [
        { title: "Create Ads From Competitor Signals", desc: "Turn competitor ad patterns into new concepts.", avatars: ["alt", "buzz"], bg: "linear-gradient(135deg,#EEF0FF 0%,#E6E2FF 100%)",
          icon: <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/><path d="M11 8v6M8 11h6"/></svg> },
        { title: "Launch Meta Image Campaign", desc: "Create image ads and prepare a Meta launch plan.", avatars: ["buzz", "gray"], bg: "linear-gradient(135deg,#E9F0FF 0%,#DCE6FF 100%)",
          icon: <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1877F2" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 16c2.5 0 3.5-8 6-8s3.5 8 6 8 3-6 4-6"/><path d="M4 16c-1 0-2-1-2-3s1-5 3-5 3 4 3 4"/><path d="M20 16c1 0 2-1 2-3s-1-5-3-5-3 4-3 4"/></svg> },
        { title: "Create Short Video Ads", desc: "Produce short video ad concepts from brand assets.", badge: "Pro Plan", avatars: ["buzz", "gray"], bg: "linear-gradient(135deg,#EDE9FF 0%,#DCD6FF 100%)",
          icon: <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> },
      ];
      return (
        <div className="mt-8">
          <AvatarMessage className="mb-6" text="Your onboarding setup is ready. Pick what you want to do next, and I’ll continue in chat with the brand context, competitor references, and first ads we just created.">
          <div className="grid grid-cols-4 gap-5">
            {ucs.map((uc, i) => <UseCaseCard key={i} uc={uc} onRun={() => setPaywall(true)} />)}
            <button onClick={() => setPaywall(true)} className="bg-white border border-gray-200 rounded-2xl shadow-sm flex flex-col items-center justify-center gap-3 text-gray-800 hover:shadow-md hover:text-[#FF5255] transition-all">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M2 4h6a4 4 0 0 1 4 4v12a3 3 0 0 0-3-3H2z"/><path d="M22 4h-6a4 4 0 0 0-4 4v12a3 3 0 0 1 3-3h7z"/></svg>
              <span className="font-bold">Show All Use Cases</span>
            </button>
          </div>
          </AvatarMessage>
          {paywall && <UpgradeModal onClose={() => setPaywall(false)} />}
        </div>
      );
    }

    function GenerationLoading({ onDone }) {
      const groups = Math.ceil(DATA.proTips.length / 3);
      const [group, setGroup] = useState(() => Math.floor(Math.random() * groups));
      const [shown, setShown] = useState(0);
      const firstShow = useRef(true);
      useEffect(() => {
        const done = setTimeout(onDone, 60000);
        const rot = setInterval(() => setGroup((g) => (g + 1) % groups), 9000);
        return () => { clearTimeout(done); clearInterval(rot); };
      }, []);
      useEffect(() => {
        if (!firstShow.current) { setShown(3); return; }
        firstShow.current = false;
        setShown(0);
        let n = 0;
        const iv = setInterval(() => { n += 1; setShown(n); if (n >= 3) clearInterval(iv); }, 350);
        return () => clearInterval(iv);
      }, [group]);
      const tips = DATA.proTips.slice(group * 3, group * 3 + 3);
      return (
        <div className="max-w-7xl mx-auto px-6 py-6">
          <AvatarLine className="mb-6"><span className="shimmer-text font-medium">Buzz is creating ads... This may take a few minutes.</span></AvatarLine>
          <div className="grid md:grid-cols-3 gap-5 items-stretch">
            {tips.map((t, i) => (
              shown > i &&
              <div key={group + "-" + i} className="bg-white border border-gray-200 rounded-2xl shadow-sm p-6 flex flex-col min-h-[230px] fade-in">
                <div className="flex items-center justify-between mb-5">
                  <span className="text-xs font-bold tracking-wide text-[#FF5255]">PRO TIP</span>
                  <span className="text-xs bg-gray-100 text-gray-600 rounded-full px-2.5 py-1">{t.tag}</span>
                </div>
                <div className="text-3xl font-extrabold mb-3 leading-tight bg-gradient-to-br from-[#FFA73C] to-[#FF5255] bg-clip-text text-transparent">{t.big}</div>
                <p className="text-sm text-gray-700 leading-relaxed">{t.desc}</p>
                <p className="text-xs text-gray-400 mt-auto pt-4">{t.src}</p>
              </div>
            ))}
          </div>
          <VideoAdsCard className="mt-8" message="While you wait, you can checkout video ads below" />
        </div>
      );
    }
    function AdPoster({ ad, onOpen, onGenerateVideo }) {
      return (
        <div className="group relative rounded-2xl overflow-hidden border border-gray-200 shadow-sm hover:shadow-md transition-all bg-white">
          <button onClick={onOpen} className="block w-full">
            <img src={ad.img} alt="" className="w-full aspect-square object-cover block" />
          </button>
          <div className="absolute inset-x-0 bottom-0 p-4 flex justify-center opacity-0 group-hover:opacity-100 transition-all bg-gradient-to-t from-black/55 to-transparent pt-12 pointer-events-none">
            <button onClick={(e) => { e.stopPropagation(); onGenerateVideo(); }} className="btn-grad rounded-full px-5 py-2.5 text-sm font-semibold flex items-center justify-center gap-2 shadow-lg pointer-events-auto">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l6-3v10l-6-3"/></svg>
              Generate video
            </button>
          </div>
        </div>
      );
    }

    function Lightbox({ ads, index, onClose }) {
      const [i, setI] = useState(index);
      const prev = (e) => { e && e.stopPropagation(); setI((p) => (p - 1 + ads.length) % ads.length); };
      const next = (e) => { e && e.stopPropagation(); setI((p) => (p + 1) % ads.length); };
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "ArrowLeft") prev();
          else if (e.key === "ArrowRight") next();
          else if (e.key === "Escape") onClose();
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);
      const navBtn = "absolute top-1/2 -translate-y-1/2 w-11 h-11 rounded-full bg-white/15 hover:bg-white/30 text-white flex items-center justify-center backdrop-blur-sm transition-all";
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-6 fade-in" onClick={onClose}>
          <button onClick={onClose} className="absolute top-5 right-5 w-10 h-10 rounded-full bg-white/15 hover:bg-white/30 text-white flex items-center justify-center text-xl backdrop-blur-sm transition-all">✕</button>
          <button onClick={prev} className={navBtn + " left-5"} aria-label="Previous">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <img src={ads[i].img} alt="" onClick={(e) => e.stopPropagation()} className="max-h-[86vh] max-w-[86vw] rounded-2xl object-contain shadow-2xl" />
          <button onClick={next} className={navBtn + " right-5"} aria-label="Next">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
          <div className="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2">
            {ads.map((_, k) => <span key={k} className={"h-1.5 rounded-full transition-all " + (k === i ? "w-6 bg-white" : "w-1.5 bg-white/40")} />)}
          </div>
        </div>
      );
    }

    function UpgradeModal({ onClose }) {
      return (
        <div className="fixed inset-0 z-50 bg-[#F1F1F3] overflow-auto fade-in">
          <button onClick={onClose} className="fixed top-5 right-5 z-10 w-10 h-10 rounded-full bg-white border border-gray-200 shadow-sm hover:bg-gray-50 text-gray-600 flex items-center justify-center text-xl transition-all">✕</button>
          <div className="min-h-full flex flex-col items-center justify-center px-6 py-16">
            <h2 className="text-3xl font-extrabold text-gray-900 text-center">Upgrade to keep creating</h2>
            <p className="text-gray-500 mt-3 text-center max-w-lg">You've used your free creatives. Pick a plan to generate unlimited ads, videos, and connect your ad accounts.</p>
            <div className="grid md:grid-cols-2 gap-6 mt-10 w-full max-w-3xl">
              {DATA.plans.map((p) => (
                <div key={p.name} className={`rounded-2xl p-7 bg-white border ${p.featured ? "border-[#FF7A45] ring-2 ring-orange-100 relative shadow-md" : "border-gray-200 shadow-sm"}`}>
                  {p.featured && <span className="absolute -top-3 right-5 btn-grad text-xs font-semibold rounded-full px-3 py-1">Popular</span>}
                  <h3 className="font-bold text-gray-900 text-lg">{p.name}</h3>
                  <div className="mt-2"><span className="text-4xl font-extrabold text-gray-900">{p.price}</span><span className="text-gray-500">{p.per}</span></div>
                  <ul className="mt-6 space-y-2.5">
                    {p.features.map((f) => <li key={f} className="text-sm text-gray-600 flex gap-2"><span className="text-[#FF5255]">✓</span>{f}</li>)}
                  </ul>
                  <button className={`mt-7 w-full rounded-xl py-3 font-semibold transition-all ${p.featured ? "btn-grad" : "border border-gray-300 text-gray-700 hover:bg-gray-50"}`}>Choose {p.name}</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Dashboard() {
      const [lightboxIndex, setLightboxIndex] = useState(null);
      const [paywall, setPaywall] = useState(false);
      return (
        <div className="max-w-7xl mx-auto px-6 py-6">
          <AvatarLine className="mb-8">👏 Congrats on creating your first ads! Later, you can make video ads too.</AvatarLine>
          <div className="grid grid-cols-3 gap-5">
            {DATA.ads.map((ad, i) => <AdPoster key={ad.id} ad={ad} onOpen={() => setLightboxIndex(i)} onGenerateVideo={() => setPaywall(true)} />)}
          </div>

          <VideoAdsCard className="mt-8" message="You can create video ads, too" />

          <NextSteps />

          {lightboxIndex !== null && <Lightbox ads={DATA.ads} index={lightboxIndex} onClose={() => setLightboxIndex(null)} />}
          {paywall && <UpgradeModal onClose={() => setPaywall(false)} />}
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("login"); // 'login' | 'loading' | 'app'
      const [step, setStep] = useState(1);
      const [selectedFormats, setSelectedFormats] = useState(["feed11"]);

      // 渐进式单页:只要页面变高(出现新内容,无论是新 step 还是同一卡片内的状态变化/
      // 打字机揭示),就平滑滚动到最新内容。用 MutationObserver 监听 DOM 变化 + 高度增长判断。
      useEffect(() => {
        if (screen !== "app") return;
        let last = document.documentElement.scrollHeight;
        let raf = 0;
        function toBottom() {
          window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" });
        }
        function check() {
          // step 5 是配置弹窗(overlay),不滚动底部
          if (step === 5) { last = document.documentElement.scrollHeight; return; }
          const h = document.documentElement.scrollHeight;
          if (h > last + 4) { last = h; cancelAnimationFrame(raf); raf = requestAnimationFrame(toBottom); }
        }
        const obs = new MutationObserver(check);
        obs.observe(document.body, { childList: true, subtree: true, characterData: true });
        const id = setTimeout(check, 120);
        return () => { obs.disconnect(); clearTimeout(id); cancelAnimationFrame(raf); };
      }, [screen, step]);

      function restart() {
        setSelectedFormats(["feed11"]);
        setStep(1);
        setScreen("login");
        window.scrollTo({ top: 0 });
      }

      if (screen === "login") return <LoginScreen onNext={() => setScreen("loading")} />;
      if (screen === "loading") return <EntryLoading onDone={() => setScreen("app")} />;

      return (
        <AppShell step={step} onRestart={restart}>
          <div className="space-y-2">
            <div data-step="1"><BasicDetailsForm onNext={() => setStep(2)} /></div>
            {step >= 2 && <div data-step="2" className="fade-in"><UrlInputScreen onNext={() => setStep(3)} /></div>}
            {step >= 3 && <div data-step="3" className="fade-in"><BrandDNA onNext={() => setStep(5)} active={step === 3} /></div>}
            {step === 6 && <div data-step="6" className="fade-in"><GenerationLoading onDone={() => setStep(7)} /></div>}
            {step >= 7 && <div data-step="7" className="fade-in"><Dashboard /></div>}
          </div>
          {step === 5 && (
            <ConfigModal
              selectedFormats={selectedFormats}
              setSelectedFormats={setSelectedFormats}
              onSubmit={() => setStep(6)}
              onClose={() => setStep(3)}
            />
          )}
        </AppShell>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
